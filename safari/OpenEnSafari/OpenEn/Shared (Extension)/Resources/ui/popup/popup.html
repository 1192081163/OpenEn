<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./popup.css" />
    <title>OpenEn</title>
  </head>
  <body>
    <main>
    <header>
      <strong>OpenEn</strong>
      <button id="openVocabulary" type="button">生词本</button>
    </header>
	    <form id="translationSettings" autocomplete="off">
	      <div id="providerStatus">本地中文模式</div>
	      <label>
	        DeepSeek API 密钥
        <input id="deepseekApiKey" type="password" placeholder="sk-..." />
      </label>
      <label>
        模型
        <input id="deepseekModel" type="text" value="deepseek-v4-flash" />
      </label>
      <div class="settings-actions">
        <button id="saveDeepSeek" type="submit">保存</button>
	        <button id="clearDeepSeek" type="button">清除</button>
	      </div>
	    </form>
	    <label class="toggle-row">
	      <input id="highlightVocabulary" type="checkbox" />
	      高亮生词
	    </label>
	    <ul id="recentWords"></ul>
	  </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
